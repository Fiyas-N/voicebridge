name: voicebridge_final
description: English speaking practice app with AI assessment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.15.0
  
  # Environment Configuration
  flutter_dotenv: ^5.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Audio Recording & Playback
  record: ^5.2.0
  audioplayers: ^5.2.1
  permission_handler: ^11.2.0
  
  # Networking & Connectivity
  http: ^1.1.2
  connectivity_plus: ^5.0.2
  
  # UI & Utilities
  intl: ^0.18.1
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  
  # Text-to-Speech (AI voice in conversation mode)
  flutter_tts: ^4.0.2
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/

dependency_overrides:
  record_linux: ^1.3.0
