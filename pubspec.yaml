name: voicebridge_final
description: English speaking practice app with AI assessment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  
  # Environment Configuration
  flutter_dotenv: ^5.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  path: ^1.9.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Audio Recording & Playback
  record: ^5.2.0
  audioplayers: ^5.2.1
  permission_handler: ^11.2.0
  
  # UI & Utilities
  intl: ^0.18.1
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  
  # Text-to-Speech (AI voice in conversation mode)
  flutter_tts: ^4.0.2
  kokoro_tts_flutter: ^0.2.0+1
  
  # On-Device AI (STT)
  whisper_flutter_new: ^1.0.1

  # On-Device LLM (Gemma 3 via MediaPipe / LiteRT)
  flutter_gemma: ^0.9.0

  # Offline language detection (55 languages — catches non-English speech)
  flutter_langdetect: ^0.0.1

  # Hybrid LLM routing — internet detection + HTTP cloud calls
  connectivity_plus: ^7.1.1
  http: ^1.2.0

  cupertino_icons: 1.0.8
  flutter_neumorphic_plus: ^3.5.0
  flutter_spinkit: ^5.2.2
  awesome_snackbar_content: ^0.1.1
  flutter_slidable: ^4.0.3
  shimmer: ^3.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/us_gold.json
    - assets/tokenizer_vocab.json
    - assets/images/
    - assets/icons/
    - assets/models/kokoro/
    - assets/models/whisper/

dependency_overrides:
  record_linux: ^1.3.0
